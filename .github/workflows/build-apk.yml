name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o ZonghengMockLocation.zip -d project
          ls -la project

      - name: Find project root
        run: |
          if [ -f "project/settings.gradle.kts" ]; then
            echo "PROJECT_DIR=project" >> $GITHUB_ENV
          elif [ -f "project/ZonghengMockLocation/settings.gradle.kts" ]; then
            echo "PROJECT_DIR=project/ZonghengMockLocation" >> $GITHUB_ENV
          else
            echo "没有找到 settings.gradle.kts"
            find project -maxdepth 4 -type f
            exit 1
          fi

      - name: Patch Android config
        run: |
          touch "$PROJECT_DIR/gradle.properties"
          echo "android.useAndroidX=true" >> "$PROJECT_DIR/gradle.properties"
          echo "android.enableJetifier=true" >> "$PROJECT_DIR/gradle.properties"
          echo "kotlin.jvm.target.validation.mode=warning" >> "$PROJECT_DIR/gradle.properties"

          BUILD_FILE="$PROJECT_DIR/app/build.gradle.kts"
          MANIFEST_FILE="$PROJECT_DIR/app/src/main/AndroidManifest.xml"

          sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g' "$BUILD_FILE"
          sed -i 's/jvmTarget = "1.8"/jvmTarget = "17"/g' "$BUILD_FILE"

          if ! grep -q "compileOptions" "$BUILD_FILE"; then
            awk '
              /compileSdk/ && done == 0 {
                print
                print ""
                print "    compileOptions {"
                print "        sourceCompatibility = JavaVersion.VERSION_17"
                print "        targetCompatibility = JavaVersion.VERSION_17"
                print "    }"
                done = 1
                next
              }
              { print }
            ' "$BUILD_FILE" > "$BUILD_FILE.tmp"
            mv "$BUILD_FILE.tmp" "$BUILD_FILE"
          fi

          if ! grep -q "ACCESS_MOCK_LOCATION" "$MANIFEST_FILE"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_MOCK_LOCATION" />' "$MANIFEST_FILE"
          fi

          cat "$PROJECT_DIR/gradle.properties"
          cat "$BUILD_FILE"
          cat "$MANIFEST_FILE"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle assembleDebug --stacktrace --no-daemon
          mkdir -p "$GITHUB_WORKSPACE/apk-output"
          cp app/build/outputs/apk/debug/*.apk "$GITHUB_WORKSPACE/apk-output/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zongheng-mock-location-apk
          path: apk-output/*.apk
